<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tijitoon - Faire une demande</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#fff6e3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tijitoon">
<link rel="apple-touch-icon" href="/tijitoon/icons/tijitoon-apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="js/theme-init.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha384-/o6I2CkkWC//PSjvWC/eYN7l3xM3tJm8ZzVkCOfp//W05QcE3mlGskpoHB6XqI+B" crossorigin="anonymous" media="print" onload="this.media='all'">
<link rel="stylesheet" href="css/request.css">
<script src="js/analytics.js" defer></script>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="back-btn" href="./"><i class="fa-solid fa-angle-left"></i> CATALOGUE</a>
  <span class="topbar-title">FAIRE UNE DEMANDE</span>
  <button class="theme-toggle" id="theme-toggle" aria-label="Basculer le thème">
    <span id="theme-label">DARK</span>
    <span class="theme-switch"></span>
  </button>
</div>

<!-- INTRO -->
<div class="req-intro">
  <h1 class="req-headline">FAIS TA DEMANDE !</h1>
  <div class="req-block">
    <p>Tu te souviens d'un dessin animé de ton enfance qu'on n'a pas encore ajouté ? Dis-nous lequel !</p>
  </div>
</div>

<!-- MAIN -->
<div class="req-page">

  <div class="req-card">

    <!-- header bar -->
    <div class="req-card-header">
      <span>&gt;&gt; NOUVELLE DEMANDE_</span>
    </div>

    <!-- form -->
    <form class="req-form" id="req-form" action="https://formspree.io/f/mjgddkqp" method="POST">

      <div class="req-field">
        <label class="req-label" for="req-title">NOM DU DESSIN ANIMÉ</label>
        <div class="req-input-wrap">
          <span class="req-prefix">&gt;</span>
          <input class="req-input" id="req-title" name="titre" type="text" placeholder="Ex: Sailor Moon…" autocomplete="off">
        </div>
      </div>

      <div class="req-field">
        <label class="req-label" for="req-desc">DESCRIPTION</label>
        <div class="req-textarea-wrap">
          <textarea class="req-textarea" id="req-desc" name="details" placeholder="Détails supplémentaires…"></textarea>
        </div>
      </div>

      <div class="req-field">
        <div class="cf-turnstile" id="req-turnstile"
          data-sitekey="0x4AAAAAADnPdquihynew8y8"
          data-theme="auto"
          data-callback="onTurnstileSolved"
          data-expired-callback="onTurnstileExpired">
        </div>
      </div>

      <button class="req-submit" id="req-submit" type="submit">ENVOYER <i class="fa-solid fa-angle-right"></i></button>

      <div class="req-success" id="req-success">
        <i class="fa-solid fa-paper-plane"></i> DEMANDE ENVOYÉE_
      </div>

    </form>
  </div>

</div>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="js/theme.js"></script>
<script src="js/request.js"></script>
</body>
</html>
