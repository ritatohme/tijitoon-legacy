<!-- TOPBAR -->
<div class="topbar">
  <a class="back-btn" href="./"><i class="fa-solid fa-angle-left"></i> CATALOGUE</a>
  <span class="topbar-title">FAIRE UNE DEMANDE</span>
  <button class="theme-toggle" id="theme-toggle" aria-label="Basculer le thème">
    <span id="theme-label">DARK</span>
    <span class="theme-switch"></span>
  </button>
</div>

<!-- INTRO -->
<div class="req-intro">
  <h1 class="req-headline">FAIS TA DEMANDE !</h1>
  <div class="req-block">
    <p>Tu te souviens d'un dessin animé de ton enfance qu'on n'a pas encore ajouté ? Dis-nous lequel !</p>
  </div>
</div>

<!-- MAIN -->
<div class="req-page">

  <div class="req-card">

    <!-- header bar -->
    <div class="req-card-header">
      <span>&gt;&gt; NOUVELLE DEMANDE_</span>
    </div>

    <!-- form -->
    <form class="req-form" id="req-form" action="https://formspree.io/f/mjgddkqp" method="POST">

      <div class="req-field">
        <label class="req-label" for="req-title">NOM DU DESSIN ANIMÉ</label>
        <div class="req-input-wrap">
          <span class="req-prefix">&gt;</span>
          <input class="req-input" id="req-title" name="titre" type="text" placeholder="Ex: Sailor Moon…" autocomplete="off">
        </div>
      </div>

      <div class="req-field">
        <label class="req-label" for="req-desc">DESCRIPTION</label>
        <div class="req-textarea-wrap">
          <textarea class="req-textarea" id="req-desc" name="details" placeholder="Détails supplémentaires…"></textarea>
        </div>
      </div>

      <div class="req-field">
        <div class="cf-turnstile" id="req-turnstile"
          data-sitekey="0x4AAAAAADnPdquihynew8y8"
          data-theme="auto"
          data-callback="onTurnstileSolved"
          data-expired-callback="onTurnstileExpired">
        </div>
      </div>

      <button class="req-submit" id="req-submit" type="submit">ENVOYER <i class="fa-solid fa-angle-right"></i></button>

      <div class="req-success" id="req-success">
        <i class="fa-solid fa-paper-plane"></i> DEMANDE ENVOYÉE_
      </div>

    </form>
  </div>

</div>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="theme.js"></script>
<script src="request.js"></script>
