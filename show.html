<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tijitoon - Série</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#fff6e3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tijitoon">
<link rel="apple-touch-icon" href="/tijitoon/icons/tijitoon-apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="js/theme-init.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha384-/o6I2CkkWC//PSjvWC/eYN7l3xM3tJm8ZzVkCOfp//W05QcE3mlGskpoHB6XqI+B" crossorigin="anonymous" media="print" onload="this.media='all'">
<link rel="stylesheet" href="css/show.css">
<script src="js/analytics.js" defer></script>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="back-btn" href="./"><i class="fa-solid fa-angle-left"></i> CATALOGUE</a>
  <span class="topbar-title" id="topbar-title"></span>
  <button class="theme-toggle" id="theme-toggle" aria-label="Basculer le thème">
    <span id="theme-label">DARK</span>
    <span class="theme-switch"></span>
  </button>
</div>

<!-- HERO -->
<div class="show-hero">
  <h1 class="show-title" id="show-title">SÉRIE</h1>
  <div class="show-notes" id="show-notes">
    <div class="show-notes-lines" id="show-notes-lines"></div>
    <button class="show-notes-toggle" id="show-notes-toggle" aria-expanded="false" aria-controls="show-notes-lines"><i class="fa-solid fa-caret-down"></i> LIRE PLUS</button>
  </div>
</div>

<div class="show-layout">

<!-- LEFT: player + nav -->
<div class="show-left">
  <div class="player-section">
    <div class="player-wrap" id="player-wrap">
      <iframe id="player-iframe" allowfullscreen webkitallowfullscreen mozallowfullscreen
        allow="autoplay; fullscreen *; picture-in-picture; web-share"></iframe>
      <video id="player-video" controls controlslist="nodownload" playsinline webkit-playsinline></video>
      <div id="art-player"></div>
      <button id="fs-exit">✕</button>
      <div class="player-placeholder" id="player-placeholder">
        <div class="pl-title" id="pl-bg-title"></div>
        <div class="pl-hint" id="pl-hint">Sélectionne un épisode <span class="pl-arrow"></span></div>
      </div>
    </div>
  </div>
  <div class="ep-nav-bar">
    <div class="ep-nav-inner">
      <button class="ep-nav-btn" id="btn-prev" disabled><i class="fa-solid fa-angle-left"></i> <span class="nav-label">PRÉC.</span></button>
      <div class="ep-nav-center">
        <span class="ep-now-playing" id="ep-now-playing"></span>
        <span class="ep-nav-counter" id="ep-nav-counter">- / -</span>
      </div>
      <button id="fs-btn" class="ep-nav-btn" title="Fullscreen">⛶</button>
      <button class="ep-nav-btn ep-report-btn" id="btn-report" disabled><i class="fa-solid fa-triangle-exclamation"></i> <span class="report-label">LIEN MORT</span></button>
      <button class="ep-nav-btn" id="btn-next" disabled><span class="nav-label">SUIV.</span> <i class="fa-solid fa-angle-right"></i></button>
    </div>
  </div>
</div>

<!-- RIGHT: episode browser -->
<div class="ep-browser">
  <div class="season-pills" id="season-tabs" style="display:none;"></div>
  <div class="ep-browser-header">
    <span class="ep-count-label" id="ep-count-label"></span>
    <button class="ep-search-toggle" id="ep-search-toggle" aria-label="Rechercher"><i class="fa-solid fa-magnifying-glass"></i></button>
    <div class="ep-view-toggle">
      <button class="ep-view-btn active" id="epv-grid" title="Grille"><i class="fa-solid fa-grip"></i></button>
      <button class="ep-view-btn" id="epv-list" title="Liste"><i class="fa-solid fa-bars"></i></button>
    </div>
  </div>
  <div class="ep-search-wrap" id="ep-search-wrap">
    <div class="ep-search-bar">
      <span class="ep-search-prefix">&gt;&gt;</span>
      <input class="ep-search" id="ep-search" type="text" placeholder="Rechercher un épisode…" autocomplete="off">
      <button class="ep-search-clear" id="ep-search-clear" aria-label="Effacer"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </div>
  <div class="ep-no-results" id="ep-no-results">Aucun épisode trouvé</div>
  <div class="ep-grid" id="ep-grid"></div>
  <div class="ep-list-wrap" id="ep-list-wrap"></div>
  <div class="ep-pagination" id="ep-pagination">
    <button class="ep-page-btn" id="ep-page-prev"><i class="fa-solid fa-angle-left"></i></button>
    <span class="ep-page-info" id="ep-page-info"></span>
    <button class="ep-page-btn" id="ep-page-next"><i class="fa-solid fa-angle-right"></i></button>
  </div>
</div><!-- ep-browser -->

</div><!-- show-layout -->

<script src="js/theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js" integrity="sha384-5E8B0pTlZZJMabWpC0fyYf6OUpe15jJij34BqBAh4NXoHAlLNOjCPRrwtOXOQFAn" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/artplayer@5.4.0/dist/artplayer.min.js" integrity="sha384-b0dFEvmX/0TLc+ZExt6a5hF8ADPnV1UaqWhNbYzcck1mHYy7ttue8FwZtoHdc0bh" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/artplayer-plugin-hls-control@1.1.0/dist/artplayer-plugin-hls-control.min.js" integrity="sha384-9TDEQow3ywtsklkkHB03YhbaKPN/+jIBkUBIUo6CjNSZIgSD9ypbcogYh4BvyKGa" crossorigin="anonymous"></script>
<script src="js/shared.js"></script>
<script src="js/player.js"></script>
<script src="js/show.js"></script>
</body>
</html>
