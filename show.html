<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tijitoon — Série</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script>(function(){var s=localStorage.getItem('tijitoon_theme');if(s)document.documentElement.dataset.theme=s;})();</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print" onload="this.media='all'">
<style>
  body { background-image: none; overflow-x: hidden; }

  /* ── TOPBAR ── */
  .topbar { position: sticky; top: 0; z-index: 100; }
  .topbar-title {
    opacity: .4; font-size: clamp(.75rem,1.5vw,1rem);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }

  /* ── HERO ── */
  .show-hero {
    background: var(--ink); color: var(--paper);
    padding: 1.4rem 5vw 1.2rem;
    border-bottom: 4px solid var(--lime);
  }
  .show-eyebrow {
    display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
    margin-bottom: .6rem;
  }
  .show-tag {
    font-family: 'VT323', monospace; font-size: .9rem;
    padding: .1rem .5rem; border: 2px solid rgba(255,246,227,.4);
  }
  .tag-ANIME   { background: var(--hot);    color: var(--paper); border-color: var(--hot); }
  .tag-FR      { background: var(--orange); color: var(--ink);   border-color: var(--orange); }
  .tag-TOON    { background: var(--lime);   color: var(--ink);   border-color: var(--lime); }
  .tag-KIDS    { background: var(--sky);    color: var(--ink);   border-color: var(--sky); }
  .tag-default { background: var(--lime);   color: var(--ink);   border-color: var(--lime); }
  .tag-star    { background: var(--cream);  color: var(--ink);   border-color: var(--cream); }
  .show-years  { font-family: 'VT323', monospace; font-size: 1rem; opacity: .4; }
  .ch-badge {
    font-family: 'Bungee', sans-serif; font-size: .7rem;
    padding: .2rem .7rem; border: 2px solid rgba(255,246,227,.3);
    box-shadow: 2px 2px 0 rgba(255,246,227,.2);
  }
  .ch-badge.teletoon { background: var(--hot); border-color: var(--hot); }
  .ch-badge.tiji     { background: var(--sky); color: var(--ink); border-color: var(--sky); }
  h1.show-title {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(1.4rem,4vw,2.8rem);
    line-height: .92; letter-spacing: -.02em; color: var(--paper);
    text-shadow: 3px 3px 0 var(--hot), 6px 6px 0 var(--sky);
    word-break: break-word;
  }
  /* ── 2-COL LAYOUT ── */
  .show-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 22vw;
    align-items: start;
    width: 100%;
    padding: 3vw 6vw 4rem;
    gap: 2rem;
  }
  .show-left { min-width: 0; }

  /* ── PLAYER ── */
  .player-section {
    background: #0d0c14;
  }
  .player-wrap {
    aspect-ratio: 16 / 9;
    position: relative;
    overflow: hidden;
    background: #111;
    display: flex; align-items: center; justify-content: center;
  }
  #player-iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; }
  #player-iframe.mega-scaled { transform-origin: top left; }
  #player-video  { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; }
  #fs-btn { display: none; }
  #fs-exit {
    display: none;
    position: fixed; top: .75rem; left: .75rem; z-index: 10000;
    background: rgba(0,0,0,.6); color: #fff; border: none;
    border-radius: 4px; padding: .4rem .7rem; font-size: 1rem; cursor: pointer;
  }
  .player-wrap.fake-fs {
    position: fixed; inset: 0; z-index: 9999;
    width: 100vw; height: 100vh;
    aspect-ratio: unset;
  }

  .player-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1rem; text-align: center; padding: 1.5rem;
  }
  .pl-title {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(1.8rem,6vw,4.5rem);
    line-height: .88; letter-spacing: -.03em;
    color: rgba(255,246,227,.04);
    text-transform: uppercase; word-break: break-word;
  }
  @media (max-width: 600px) {
    .pl-title { display: none; }
  }
  .player-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1rem; text-align: center; padding: 1.5rem;
  }
  .pl-hint {
    font-family: 'VT323', monospace; font-size: 1rem;
    color: rgba(255,246,227,.22);
    border: 1px solid rgba(255,246,227,.12);
    padding: .25rem 1rem; letter-spacing: .05em;
  }
  .pl-arrow::after { content: '↓'; }
  @media (min-width: 861px) {
    .pl-arrow::after { content: '→'; }
  }
  .player-external-link {
    padding: .55rem 1.4rem;
    background: var(--lime); color: var(--ink);
    font-family: 'Bungee', sans-serif; font-size: .82rem;
    text-decoration: none; border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform .1s, box-shadow .1s; display: inline-block;
  }
  .player-external-link:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--ink); }
  .pl-ep-label {
    font-family: 'VT323', monospace; font-size: 1rem;
    color: rgba(255,246,227,.4);
  }
  .pl-unavail {
    font-family: 'VT323', monospace; font-size: 1rem;
    color: rgba(255,246,227,.3);
  }

  /* ── EP NAV BAR ── */
  .ep-nav-bar {
    background: var(--ink);
    padding: clamp(.35rem, .5vw, .8rem) clamp(.6rem, 1vw, 1.4rem);
  }
  .ep-nav-inner {
    display: flex; align-items: center; gap: .6rem;
    overflow: hidden;
  }
  .ep-nav-btn {
    font-family: 'Bungee', sans-serif; font-size: clamp(.6rem, 1vw, 1rem);
    padding: clamp(.3rem, .5vw, .7rem) clamp(.6rem, .9vw, 1.2rem);
    border: 2px solid rgba(255,246,227,.2);
    color: rgba(255,246,227,.5); background: transparent;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: all .1s;
  }
  #btn-prev:not(:disabled) { color: var(--paper); border-color: rgba(255,246,227,.4); }
  #btn-next:not(:disabled) { color: var(--paper); border-color: rgba(255,246,227,.4); }
  #btn-prev:not(:disabled):hover { background: var(--lime); color: var(--ink); border-color: var(--lime); }
  #btn-next:not(:disabled):hover { background: var(--hot); color: var(--paper); border-color: var(--hot); }
  .ep-nav-btn:disabled { opacity: .2; cursor: default; }
  .ep-nav-center {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; align-items: center; gap: .1rem;
    overflow: hidden;
  }
  .ep-now-playing {
    font-family: 'VT323', monospace; font-size: clamp(.85rem, 1.2vw, 1.4rem);
    color: rgba(255,246,227,.6);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    width: 100%; text-align: center;
  }
  .ep-nav-counter {
    font-family: 'VT323', monospace; font-size: clamp(.7rem, 1vw, 1.1rem);
    color: rgba(255,246,227,.3);
  }

  /* ── EPISODE BROWSER ── */
  .ep-browser {
    padding: 1.5rem 0 0;
    min-width: 0;
    position: sticky;
    top: 1rem;
  }

  /* Season pills */
  .season-pills {
    display: flex; gap: .4rem; flex-wrap: wrap;
    margin-bottom: 1.2rem; align-items: center;
  }
  .season-pill {
    font-family: 'Bungee', sans-serif; font-size: clamp(.75rem, 1vw, 1.1rem);
    width: clamp(2.2rem, 2.8vw, 3.2rem); height: clamp(2.2rem, 2.8vw, 3.2rem);
    display: flex; align-items: center; justify-content: center;
    background: var(--paper); border: 3px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    cursor: pointer; transition: all .1s; flex-shrink: 0;
    color: var(--ink);
  }
  .season-pill:hover:not(.active) { background: var(--cream); transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .season-pill.active { background: var(--ink); color: var(--lime); box-shadow: none; transform: translate(2px,2px); }
  .season-pill.film-type { border-color: var(--hot); color: var(--hot); }
  .season-pill.film-type:hover:not(.active) { box-shadow: 4px 4px 0 var(--hot); }
  .season-pill.film-type.active { background: var(--hot); color: var(--paper); border-color: var(--hot); box-shadow: none; }
  .season-pill-label {
    font-family: 'VT323', monospace; font-size: .95rem;
    color: rgba(19,17,26,.4); padding-left: .2rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Browser header: count + search + toggle */
  .ep-browser-header {
    display: flex; align-items: center; gap: .6rem;
    margin-bottom: .8rem;
  }
  .ep-count-label {
    font-family: 'VT323', monospace; font-size: clamp(.85rem, 1.1vw, 1.3rem);
    color: rgba(19,17,26,.4); flex-shrink: 0;
  }
  .ep-search-wrap {
    flex: 1; min-width: 120px;
    display: none; align-items: center;
    border: 2px solid var(--ink); box-shadow: 2px 2px 0 var(--ink);
    background: var(--paper);
  }
  .ep-search-wrap.open { display: flex; }
  .ep-search-wrap:focus-within { border-color: var(--ink); box-shadow: 2px 2px 0 var(--ink); }
  .ep-search {
    flex: 1; min-width: 0;
    font-family: 'Space Mono', monospace; font-size: clamp(.7rem, .9vw, 1rem);
    background: transparent; color: var(--ink);
    border: none; padding: clamp(.25rem, .4vw, .5rem) clamp(.5rem, .7vw, .9rem); outline: none;
  }
  .ep-search::placeholder { color: rgba(19,17,26,.3); }
  .ep-search-clear {
    font-family: 'VT323', monospace; font-size: 1.1rem;
    background: none; border: none; cursor: pointer;
    color: rgba(19,17,26,.35); padding: 0 .5rem;
    line-height: 1; display: none;
  }
  .ep-search-clear:hover { color: var(--hot); }
  .ep-search-clear.visible { display: block; }

  /* Collapsed search icon */
  .ep-search-toggle {
    display: flex; align-items: center; justify-content: center;
    background: var(--paper); border: 2px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
    cursor: pointer; padding: clamp(.28rem, .4vw, .55rem) clamp(.5rem, .7vw, .9rem);
    flex-shrink: 0; font-size: clamp(.8rem, 1vw, 1.1rem);
    color: var(--ink); margin-left: auto;
  }
  @media (max-width: 600px) {
    .ep-count-label { display: none; }
    .ep-search { font-size: 1rem; }
  }
  .ep-view-toggle {
    display: flex; border: 2px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink); flex-shrink: 0;
  }
  .ep-view-btn {
    font-size: clamp(.8rem, 1vw, 1.1rem);
    background: var(--paper); border: none; color: rgba(19,17,26,.4);
    padding: clamp(.28rem, .4vw, .55rem) clamp(.6rem, .8vw, 1rem);
    cursor: pointer; transition: all .1s; line-height: 1;
  }
  .ep-view-btn:not(:last-child) { border-right: 2px solid var(--ink); }
  .ep-view-btn.active { background: var(--ink); color: var(--lime); }
  .ep-view-btn:hover:not(.active) { background: var(--cream); color: var(--ink); }

  /* Episode grid */
  @keyframes season-flash {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .season-switching { animation: season-flash .18s ease-out; }

  .ep-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(clamp(100px, 8vw, 160px), 1fr));
    gap: clamp(.35rem, .5vw, .75rem);
  }
  .ep-card {
    background: var(--paper); border: 3px solid var(--ink);
    padding: clamp(.5rem, .7vw, 1.1rem) clamp(.6rem, .8vw, 1.2rem);
    cursor: pointer; transition: transform .12s, box-shadow .12s, background .1s;
    display: flex; flex-direction: column; gap: .25rem;
    position: relative;
  }
  .ep-card:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--ink); }
  .ep-card.playing { background: var(--lime); box-shadow: 4px 4px 0 var(--ink); transform: translate(-2px,-2px); }
  .ep-card.saved::after {
    content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
    background: var(--hot);
  }
  .ep-card.no-url { opacity: .4; cursor: default; }
  .ep-card.no-url:hover { transform: none; box-shadow: none; }
  .ep-card-num { font-family: 'VT323', monospace; font-size: clamp(.85rem, 1.1vw, 1.4rem); color: rgba(19,17,26,.3); }
  .ep-card.playing .ep-card-num { color: var(--ink); opacity: .6; }
  .ep-card-title { font-family: 'Space Mono', monospace; font-size: clamp(.65rem, .85vw, 1rem); line-height: 1.3; overflow-wrap: break-word; word-break: break-word; }
  .ep-card-play { display: none; }

  /* Episode list */
  .ep-list-wrap {
    border: 3px solid var(--ink); box-shadow: 4px 4px 0 var(--ink);
    overflow-y: auto; max-height: calc(10 * clamp(2rem, 2.8vw, 3.5rem));
    display: none;
  }
  .ep-list-wrap.active { display: block; }
  .ep-list-row {
    display: grid; grid-template-columns: clamp(2.5rem, 3.5vw, 4.5rem) 1fr;
    align-items: center;
    border-bottom: 1px solid rgba(19,17,26,.1);
    cursor: pointer; transition: background .1s;
  }
  .ep-list-row:last-child { border-bottom: none; }
  .ep-list-row:hover { background: var(--cream); }
  .ep-list-row.playing { background: var(--lime); }
  .ep-list-row.no-url { opacity: .4; cursor: default; }
  .ep-list-row.no-url:hover { background: transparent; }
  .ep-list-row.saved { border-left: 3px solid var(--hot); }
  .ep-list-num {
    font-family: 'VT323', monospace; font-size: clamp(.85rem, 1.2vw, 1.4rem);
    color: rgba(19,17,26,.3); text-align: right;
    padding: clamp(.4rem, .6vw, .8rem) clamp(.4rem, .5vw, .7rem);
    border-right: 2px solid rgba(19,17,26,.1);
  }
  .ep-list-row.playing .ep-list-num { color: var(--hot); }
  .ep-list-title {
    font-family: 'Space Mono', monospace;
    font-size: clamp(.68rem, 1vw, 1rem); line-height: 1.3;
    padding: clamp(.4rem, .6vw, .8rem) clamp(.5rem, .8vw, 1rem);
  }

  .ep-no-results {
    font-family: 'VT323', monospace; font-size: 1rem;
    color: var(--no-results-color); padding: 1.5rem 0; text-align: center;
    display: none;
  }

  .ep-pagination {
    display: none;
    align-items: center; justify-content: center; gap: .6rem;
    margin-top: .6rem;
  }
  .ep-pagination.visible { display: flex; }
  .ep-page-btn {
    font-family: 'Bungee', sans-serif; font-size: clamp(.7rem, .9vw, 1rem);
    padding: clamp(.25rem, .4vw, .55rem) clamp(.5rem, .7vw, .9rem);
    border: 2px solid var(--ink); box-shadow: 2px 2px 0 var(--ink);
    background: var(--paper); color: var(--ink);
    cursor: pointer; transition: all .1s;
  }
  .ep-page-btn:hover:not(:disabled) { background: var(--ink); color: var(--lime); }
  .ep-page-btn:disabled { opacity: .25; cursor: default; box-shadow: none; }
  .ep-page-info {
    font-family: 'VT323', monospace; font-size: clamp(.85rem, 1.1vw, 1.3rem);
    color: rgba(19,17,26,.4);
  }

  @media (max-width: 1080px) {
    .show-layout { grid-template-columns: 1fr; padding: 0 0 3rem; gap: 0; }
    .player-section { padding: 0 6vw; }
    .ep-browser { padding: 1.2rem 6vw 3rem; position: static; }
    .ep-list-wrap { max-width: none; }
  }
  @media (max-width: 600px) {
    .show-hero { padding: 1rem 4vw .9rem; }
    .ep-grid { gap: .4rem; }
    .ep-card { padding: .55rem .65rem; }
    .ep-list-wrap { max-height: calc(8 * 2rem); }
    .ep-nav-bar { padding: .4rem 3vw; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="back-btn" href="index.html">← CATALOGUE</a>
  <span class="topbar-title" id="topbar-title"></span>
  <button class="theme-toggle" id="theme-toggle" aria-label="Basculer le thème">
    <span id="theme-label">DARK</span>
    <span class="theme-switch"></span>
  </button>
</div>

<!-- HERO -->
<div class="show-hero">
  <div class="show-eyebrow" id="show-eyebrow" style="display:none;"></div>
  <h1 class="show-title" id="show-title">SÉRIE</h1>
</div>

<div class="show-layout">

<!-- LEFT: player + nav -->
<div class="show-left">
  <div class="player-section">
    <div class="player-wrap" id="player-wrap">
      <iframe id="player-iframe" allowfullscreen webkitallowfullscreen mozallowfullscreen
        allow="autoplay; fullscreen *; picture-in-picture; web-share"></iframe>
      <video id="player-video" controls controlslist="nodownload" playsinline webkit-playsinline></video>
      <button id="fs-exit">✕</button>
      <div class="player-placeholder" id="player-placeholder">
        <div class="pl-title" id="pl-bg-title"></div>
        <div class="pl-hint" id="pl-hint">Sélectionne un épisode <span class="pl-arrow"></span></div>
      </div>
    </div>
  </div>
  <div class="ep-nav-bar">
    <div class="ep-nav-inner">
      <button class="ep-nav-btn" id="btn-prev" disabled onclick="navigateEp(-1)">← PRÉC.</button>
      <div class="ep-nav-center">
        <span class="ep-now-playing" id="ep-now-playing">—</span>
        <span class="ep-nav-counter" id="ep-nav-counter">— / —</span>
      </div>
      <button id="fs-btn" class="ep-nav-btn" title="Fullscreen">⛶</button>
      <button class="ep-nav-btn" id="btn-next" disabled onclick="navigateEp(1)">SUIV. →</button>
    </div>
  </div>
</div>

<!-- RIGHT: episode browser -->
<div class="ep-browser">
  <div class="season-pills" id="season-tabs" style="display:none;"></div>
  <div class="ep-browser-header">
    <span class="ep-count-label" id="ep-count-label"></span>
    <button class="ep-search-toggle" id="ep-search-toggle" aria-label="Rechercher"><i class="fa-solid fa-magnifying-glass"></i></button>
    <div class="ep-search-wrap" id="ep-search-wrap">
      <input class="ep-search" id="ep-search" type="text" placeholder="Rechercher…" autocomplete="off">
      <button class="ep-search-clear" id="ep-search-clear" aria-label="Effacer">✕</button>
    </div>
    <div class="ep-view-toggle">
      <button class="ep-view-btn active" id="epv-grid" title="Grille"><i class="fa-solid fa-grip"></i></button>
      <button class="ep-view-btn" id="epv-list" title="Liste"><i class="fa-solid fa-list"></i></button>
    </div>
  </div>
  <div class="ep-no-results" id="ep-no-results">Aucun épisode trouvé</div>
  <div class="ep-grid" id="ep-grid"></div>
  <div class="ep-list-wrap" id="ep-list-wrap"></div>
  <div class="ep-pagination" id="ep-pagination">
    <button class="ep-page-btn" id="ep-page-prev">←</button>
    <span class="ep-page-info" id="ep-page-info"></span>
    <button class="ep-page-btn" id="ep-page-next">→</button>
  </div>
</div><!-- ep-browser -->

</div><!-- show-layout -->

<script src="theme.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const showId = params.get('series') || params.get('id');
  if (!showId || !/^[\w-]+$/.test(showId)) window.location.replace('404.html');

  const iframe      = document.getElementById('player-iframe');
  const video       = document.getElementById('player-video');
  const placeholder = document.getElementById('player-placeholder');
  const epGrid      = document.getElementById('ep-grid');
  const epListWrap  = document.getElementById('ep-list-wrap');
  const epPagination = document.getElementById('ep-pagination');
  const epPagePrev   = document.getElementById('ep-page-prev');
  const epPageNext   = document.getElementById('ep-page-next');
  const epPageInfo   = document.getElementById('ep-page-info');
  let PAGE_SIZE = 10;
  let currentPage = 0;

  function clamp(min, val, max) { return Math.min(max, Math.max(min, val)); }

  function computePageSize() {
    const gridWidth = epGrid.offsetWidth || epGrid.parentElement?.offsetWidth || 0;
    if (!gridWidth) return;
    const gap = 8;
    const minCard = clamp(100, gridWidth * 0.08, 160);
    const perRow = Math.max(1, Math.floor((gridWidth + gap) / (minCard + gap)));
    PAGE_SIZE = perRow * 4;
  }

  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const prevSize = PAGE_SIZE;
      computePageSize();
      if (PAGE_SIZE !== prevSize) {
        currentPage = currentEp !== -1 ? Math.floor(currentEp / PAGE_SIZE) : 0;
        renderPage();
      }
    }, 150);
  });
  const seasonTabs  = document.getElementById('season-tabs');
  const epSearch       = document.getElementById('ep-search');
  const epSearchClear  = document.getElementById('ep-search-clear');
  const epSearchWrap   = document.getElementById('ep-search-wrap');
  const epSearchToggle = document.getElementById('ep-search-toggle');

  const epCountLabel = document.getElementById('ep-count-label');

  epSearchToggle.addEventListener('click', () => {
    const isOpen = epSearchWrap.classList.contains('open');
    if (isOpen) {
      collapseSearch();
    } else {
      epSearchWrap.classList.add('open');
      epCountLabel.style.display = 'none';
      epSearch.focus();
    }
  });

  function collapseSearch() {
    epSearch.value = '';
    epSearchClear.classList.remove('visible');
    epSearchWrap.classList.remove('open');
    epCountLabel.style.display = '';
    applySearch('', false);
  }
  const noResults   = document.getElementById('ep-no-results');

  let epViewMode = localStorage.getItem('tijitoon_ep_view') || 'grid';

  const epvGrid = document.getElementById('epv-grid');
  const epvList = document.getElementById('epv-list');
  function applyEpView() {
    const isList = epViewMode === 'list';
    epGrid.style.display       = isList ? 'none' : '';
    epListWrap.classList.toggle('active', isList);
    epvGrid.classList.toggle('active', !isList);
    epvList.classList.toggle('active', isList);
  }
  function isPlayingInCurrentSeason() {
    return currentEp !== -1 && flatEps[currentPos]?.seasonIdx === currentSeason;
  }

  epvGrid.addEventListener('click', () => {
    epViewMode = 'grid';
    localStorage.setItem('tijitoon_ep_view', epViewMode);
    applyEpView();
    computePageSize();
    if (isPlayingInCurrentSeason()) currentPage = Math.floor(currentEp / PAGE_SIZE);
    renderPage();
  });

  epvList.addEventListener('click', () => {
    epViewMode = 'list';
    localStorage.setItem('tijitoon_ep_view', epViewMode);
    applyEpView();
    renderPage();
    if (isPlayingInCurrentSeason() && epListRows[currentSeason]?.[currentEp]) {
      setTimeout(() => epListRows[currentSeason][currentEp].scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 50);
    }
  });
  applyEpView();

  const playerWrap = document.getElementById('player-wrap');
  // TODO TEMP
  const fsBtn = document.getElementById('fs-btn');
  const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  const fsExit = document.getElementById('fs-exit');

  function exitFakeFs() {
    playerWrap.classList.remove('fake-fs');
    fsExit.style.display = 'none';
    document.body.style.overflow = '';
  }

  fsBtn.addEventListener('click', () => {
    playerWrap.classList.add('fake-fs');
    fsExit.style.display = 'block';
    document.body.style.overflow = 'hidden';
  });

  fsExit.addEventListener('click', exitFakeFs);
  // END TODO TEMP

  const SANDBOX_PERMISSIONS = {
    'ojamajo.moe':   'allow-scripts allow-popups allow-forms',
    'archive.org':   'allow-scripts allow-same-origin allow-popups allow-forms allow-presentation',
  };
  const DEFAULT_SANDBOX = 'allow-scripts allow-same-origin allow-popups allow-presentation';

  const WORKER_URL = 'https://crimson-night-b851.ritatohme99.workers.dev/';

  function odycdnProxyUrl(mp4Url) {
    return WORKER_URL + '?url=' + encodeURIComponent(mp4Url);
  }

  function getEpType(ep) {
    if (ep.type) return ep.type;
    if (ep.url?.includes('ojamajo.moe/videos/watch')) return 'redirect';
    // if (ep.url?.endsWith('.mp4')) return 'mp4';
    if (ep.url?.endsWith('.mp4') && !ep.url.includes('archive.org/embed')) return 'mp4';
    return 'embed';
  }

  let show          = null;
  let currentSeason = 0;
  let currentEp     = -1;
  let currentPos    = -1;
  let flatEps       = [];
  let epCards       = [];
  let epListRows    = [];
  let isRestoringFromHistory = false;
  const seasonPages = {};

  const LS_KEY = `tijitoon:progress:${showId}`;

  function saveProgress(si, ei) {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ season: si, ep: ei })); } catch(_) {}
  }
  function loadProgress() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return null;
      const { season, ep } = JSON.parse(raw);
      if (typeof season === 'number' && typeof ep === 'number') return { season, ep };
    } catch(_) {}
    return null;
  }

  function buildUrl(si, ei) {
    const u = new URLSearchParams();
    u.set('series', showId); u.set('season', si + 1); u.set('ep', ei + 1);
    return `${location.pathname}?${u}`;
  }
  function pushEpUrl(si, ei) {
    history.replaceState({ series: showId, season: si, ep: ei }, '', buildUrl(si, ei));
  }
  function readUrlEp() {
    const s = parseInt(params.get('season'), 10);
    const e = parseInt(params.get('ep'), 10);
    if (!isNaN(s) && s >= 1 && !isNaN(e) && e >= 1) return { season: s - 1, ep: e - 1 };
    return null;
  }

  fetch('data.json')
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      show = data[showId];
      if (!show) return window.location.replace('404.html');

      flatEps = show.seasons.flatMap((s, si) =>
        s.episodes.map((ep, ei) => ({ seasonIdx: si, epIdx: ei, ep }))
      );

      populateHero();
      buildSeasonTabs();
      buildEpGrid(0);

      const urlEp = readUrlEp();
      const saved  = loadProgress();

      if (urlEp) {
        const { season: si, ep: ei } = urlEp;
        const s = show.seasons[si]; const ep = s?.episodes[ei];
        if (s && ep) {
          history.replaceState({ series: showId, season: si, ep: ei }, '', buildUrl(si, ei));
          if (si !== 0) switchSeason(si);
          selectEp(si, ei, ep, true);
        } else {
          placeholder.style.display = 'flex';
        }
      } else if (saved) {
        const { season: si, ep: ei } = saved;
        const s = show.seasons[si]; const ep = s?.episodes[ei];
        if (s && ep) {
          history.replaceState({ series: showId, season: si, ep: ei }, '', buildUrl(si, ei));
          if (si !== 0) switchSeason(si);
          selectEp(si, ei, ep, false);
        } else {
          placeholder.style.display = 'flex';
        }
      } else {
        placeholder.style.display = 'flex';
      }
    })
    .catch(() => window.location.replace('404.html'));

  window.addEventListener('popstate', e => {
    if (!show || !e.state || e.state.series !== showId) return;
    const { season: si, ep: ei } = e.state;
    const s = show.seasons[si]; const ep = s?.episodes[ei];
    if (!s || !ep) return;
    isRestoringFromHistory = true;
    if (si !== currentSeason) switchSeason(si);
    selectEp(si, ei, ep, false);
    isRestoringFromHistory = false;
  });

  const TAG_LABELS = { ANIME: 'Anime', TOON: 'Cartoon', FR: 'Prod. FR', KIDS: 'Préscolaire', '★': '★' };

  function populateHero() {
    document.title = `Tijitoon — ${show.title}`;
    document.getElementById('show-title').textContent = show.title.toUpperCase();
    document.getElementById('pl-bg-title').textContent = show.title;
    document.getElementById('topbar-title').textContent = show.title.toUpperCase();

    const eyebrow = document.getElementById('show-eyebrow');
    const parts = [];
    if (show.tag) {
      const tagCls = show.tag === '★' ? 'tag-star' : `tag-${show.tag}`;
      parts.push(`<span class="show-tag ${tagCls}">${TAG_LABELS[show.tag] ?? show.tag}</span>`);
    }
    const chLabel = show.channel === 'tiji' ? 'Tiji' : 'Télétoon';
    parts.push(`<span class="ch-badge ${show.channel}">${chLabel}</span>`);
    if (show.years) parts.push(`<span class="show-years">${show.years}</span>`);
    if (parts.length) {
      eyebrow.innerHTML = parts.join('');
      eyebrow.style.display = '';
    }
  }

  function buildSeasonTabs() {
    if (show.seasons.length <= 1) return;
    seasonTabs.style.display = '';
    let filmCount = 0;
    show.seasons.forEach((s, i) => {
      const isFilm = s.type === 'films';
      if (isFilm) filmCount++;
      const btn = document.createElement('button');
      btn.className = 'season-pill' + (i === 0 ? ' active' : '') + (isFilm ? ' film-type' : '');
      btn.textContent = isFilm ? `F${filmCount}` : `S${i + 1}`;
      btn.title = s.name || `Saison ${i + 1}`;
      btn.addEventListener('click', () => { if (i !== currentSeason) switchSeason(i); });
      seasonTabs.appendChild(btn);
    });
    const label = document.createElement('span');
    label.className = 'season-pill-label';
    label.id = 'season-ep-count';
    const s0 = show.seasons[0];
    label.textContent = `— ${s0.name || 'Saison 1'}`;
    seasonTabs.appendChild(label);
  }

  function switchSeason(i) {
    currentSeason = i;
    const playingHere = currentEp !== -1 && flatEps[currentPos]?.seasonIdx === i;
    currentPage = playingHere && seasonPages[i] !== undefined ? seasonPages[i] : 0;
    collapseSearch();
    seasonTabs.querySelectorAll('.season-pill').forEach((btn, j) => btn.classList.toggle('active', j === i));
    const countEl = document.getElementById('season-ep-count');
    if (countEl) countEl.textContent = `— ${show.seasons[i].name || `Saison ${i + 1}`}`;
    buildEpGrid(i);
    if (epViewMode === 'list' && playingHere && epListRows[i]?.[currentEp]) {
      setTimeout(() => epListRows[i][currentEp].scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 50);
    } else {
      epListWrap.scrollTop = 0;
    }
    [epGrid, epListWrap].forEach(el => {
      el.classList.remove('season-switching');
      void el.offsetWidth;
      el.classList.add('season-switching');
    });
  }

  function buildEpGrid(seasonIdx) {
    epGrid.innerHTML = '';
    epListWrap.innerHTML = '';
    epCards[seasonIdx]    = [];
    epListRows[seasonIdx] = [];
    const season = show.seasons[seasonIdx];
    const count  = season.episodes.length;
    document.getElementById('ep-count-label').textContent = `${count} épisode${count > 1 ? 's' : ''}`;

    season.episodes.forEach((ep, i) => {
      const hasUrl = !!ep.url;
      const numStr = `E${String(ep.num).padStart(2,'0')}`;

      const handler = () => {
        collapseSearch();
        selectEp(seasonIdx, i, ep, true);
        if (!isRestoringFromHistory) pushEpUrl(seasonIdx, i);
      };

      const card = document.createElement('div');
      card.className = 'ep-card' + (!hasUrl ? ' no-url' : '');
      card.dataset.title = normalize(ep.title);
      card.innerHTML = `
        <div class="ep-card-num">${numStr}</div>
        <div class="ep-card-title">${ep.title}</div>`;
      if (hasUrl) card.addEventListener('click', handler);
      epGrid.appendChild(card);
      epCards[seasonIdx].push(card);

      const row = document.createElement('div');
      row.className = 'ep-list-row' + (!hasUrl ? ' no-url' : '');
      row.dataset.title = normalize(ep.title);
      row.innerHTML = `
        <span class="ep-list-num">${numStr}</span>
        <span class="ep-list-title">${ep.title}</span>`;
      if (hasUrl) row.addEventListener('click', handler);
      epListWrap.appendChild(row);
      epListRows[seasonIdx].push(row);
    });

    if (isPlayingInCurrentSeason()) {
      epCards[seasonIdx]?.[currentEp]?.classList.add('playing');
      epListRows[seasonIdx]?.[currentEp]?.classList.add('playing');
    }
    refreshSavedMark();
    computePageSize();
    applySearch('', false);
  }

  function normalize(str) {
    return str.normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();
  }

  epSearch.addEventListener('input', () => {
    epSearchClear.classList.toggle('visible', epSearch.value.length > 0);
    applySearch(epSearch.value);
  });
  epSearchClear.addEventListener('click', () => {
    collapseSearch();
    epSearch.focus();
  });

  function applySearch(q, resetPage = true) {
    const query = normalize(q.trim());
    if (resetPage) currentPage = 0;
    renderPage(query);
  }

  function renderPage(query) {
    query = query ?? normalize(epSearch.value.trim());
    const cards = Array.from(epGrid.querySelectorAll('.ep-card'));
    const rows  = Array.from(epListWrap.querySelectorAll('.ep-list-row'));

    const matchedCards = cards.filter(c => !query || c.dataset.title.includes(query));
    const matchedRows  = rows.filter(r => !query || r.dataset.title.includes(query));

    const total = matchedCards.length;
    const totalPages = Math.ceil(total / PAGE_SIZE);

    currentPage = Math.max(0, Math.min(currentPage, totalPages - 1));

    const start = currentPage * PAGE_SIZE;
    const end   = start + PAGE_SIZE;

    cards.forEach(c => c.style.display = 'none');
    matchedCards.slice(start, end).forEach(c => c.style.display = '');
    rows.forEach(r => r.style.display = matchedRows.includes(r) ? '' : 'none');

    noResults.style.display = total === 0 ? 'block' : 'none';

    if (total > PAGE_SIZE && epViewMode === 'grid') {
      epPagination.classList.add('visible');
      epPageInfo.textContent = `${start + 1}–${Math.min(end, total)} / ${total}`;
      epPagePrev.disabled = currentPage === 0;
      epPageNext.disabled = currentPage >= totalPages - 1;
    } else {
      epPagination.classList.remove('visible');
    }
  }

  function flashEpGrid() {
    epGrid.classList.remove('season-switching');
    void epGrid.offsetWidth;
    epGrid.classList.add('season-switching');
  }

  epPagePrev.addEventListener('click', () => { currentPage--; renderPage(); flashEpGrid(); });
  epPageNext.addEventListener('click', () => { currentPage++; renderPage(); flashEpGrid(); });

  function selectEp(seasonIdx, epIdx, ep, doSave) {
    currentEp  = epIdx;
    currentPos = flatEps.findIndex(e => e.seasonIdx === seasonIdx && e.epIdx === epIdx);
    currentPage = Math.floor(currentEp / PAGE_SIZE);
    seasonPages[seasonIdx] = currentPage;

    renderPage();

    if (epCards[seasonIdx])   epCards[seasonIdx].forEach((c, j)   => c.classList.toggle('playing', j === epIdx));
    if (epListRows[seasonIdx]) {
      epListRows[seasonIdx].forEach((r, j) => {
        r.classList.toggle('playing', j === epIdx);
        if (j === epIdx && epViewMode === 'list') setTimeout(() => r.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 50);
      });
    }

    const sLabel = `S${String(seasonIdx + 1).padStart(2,'0')}E${String(ep.num).padStart(2,'0')}`;
    document.getElementById('ep-now-playing').textContent = `${sLabel} — ${ep.title}`;
    document.getElementById('ep-nav-counter').textContent = `${currentPos + 1} / ${flatEps.length}`;
    document.getElementById('btn-prev').disabled = currentPos <= 0;
    document.getElementById('btn-next').disabled = currentPos >= flatEps.length - 1;

    loadEpisode(ep, seasonIdx);

    if (doSave) { saveProgress(seasonIdx, epIdx); refreshSavedMark(); }
  }

  function refreshSavedMark() {
    const saved = loadProgress();
    [epCards, epListRows].forEach(collection => {
      Object.entries(collection).forEach(([si, items]) => {
        items.forEach((el, ei) => {
          el.classList.toggle('saved', !!saved && saved.season === +si && saved.ep === ei);
        });
      });
    });
  }

  function navigateEp(dir) {
    if (currentPos === -1) return;
    const next = flatEps[currentPos + dir];
    if (!next) return;
    if (next.seasonIdx !== currentSeason) switchSeason(next.seasonIdx);
    collapseSearch();
    selectEp(next.seasonIdx, next.epIdx, next.ep, true);
    if (!isRestoringFromHistory) pushEpUrl(next.seasonIdx, next.epIdx);
  }

  const MEGA_MIN_WIDTH = 480;
  let megaScaleObserver = null;

  function applyMegaScale() {
    const w = playerWrap.offsetWidth;
    if (w >= MEGA_MIN_WIDTH) {
      iframe.classList.remove('mega-scaled');
      iframe.style.width = '';
      iframe.style.height = '';
      iframe.style.transform = '';
    } else {
      const scale = w / MEGA_MIN_WIDTH;
      const scaledH = (w * 9 / 16) / scale;
      iframe.classList.add('mega-scaled');
      iframe.style.width  = MEGA_MIN_WIDTH + 'px';
      iframe.style.height = scaledH + 'px';
      iframe.style.transform = `scale(${scale})`;
    }
  }

  function clearMegaScale() {
    if (megaScaleObserver) { megaScaleObserver.disconnect(); megaScaleObserver = null; }
    iframe.classList.remove('mega-scaled');
    iframe.style.width = '';
    iframe.style.height = '';
    iframe.style.transform = '';
  }

  function loadEpisode(ep, seasonIdx) {
    iframe.style.display = 'none'; iframe.src = '';
    video.style.display  = 'none'; video.src  = '';
    placeholder.style.display = 'none';
    placeholder.className = 'player-placeholder';
    fsBtn.style.display = 'none';
    clearMegaScale();

    if (!ep.url) { showNoVideo(ep, seasonIdx); return; }
    if (!/^https?:$/.test(new URL(ep.url).protocol)) { showNoVideo(ep, seasonIdx); return; }

    const type = getEpType(ep);

    if (type === 'redirect') {
      placeholder.style.display = 'flex';
      placeholder.innerHTML = `
        <div class="pl-ep-label">S${seasonIdx + 1} — Épisode ${ep.num}</div>
        <a class="player-external-link" href="${ep.url}" target="_blank" rel="noopener noreferrer"><i class="fa-solid fa-play"></i> Regarder sur ${new URL(ep.url).hostname}</a>`;
    } else if (type === 'mp4') {
      const src = ep.odysee ? odycdnProxyUrl(ep.url) : ep.url;
      video.src = src; video.style.display = 'block';
    } else {
      const host = new URL(ep.url).hostname;
      iframe.setAttribute('sandbox', SANDBOX_PERMISSIONS[host] ?? DEFAULT_SANDBOX);
      iframe.src = ep.url;
      iframe.style.display = 'block';
      fsBtn.style.display = (isIOS && host === 'drive.google.com') ? 'inline-block' : 'none'; // TODO TEMP
      if (host === 'mega.nz') {
        applyMegaScale();
        megaScaleObserver = new ResizeObserver(applyMegaScale);
        megaScaleObserver.observe(playerWrap);
      }
    }
  }

  function showNoVideo(ep, seasonIdx) {
    placeholder.style.display = 'flex';
    placeholder.innerHTML = `
      <div class="pl-ep-label">S${seasonIdx + 1} — Épisode ${ep.num}</div>
      <div class="pl-unavail">Vidéo non disponible pour l'instant</div>`;
  }
</script>
</body>
</html>
